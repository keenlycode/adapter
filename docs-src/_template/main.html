{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <script type="module">
  import { Adapter, AdapterMixin } from 'https://cdn.jsdelivr.net/npm/@devcapsule/adapter/+esm';
  window.Adapter = Adapter;
  window.AdapterMixin = AdapterMixin;
  </script>
  <script>
  (() => {
    const labels = {
      ts: "TypeScript",
      tsx: "TSX",
      js: "JavaScript",
      jsx: "JSX",
      html: "HTML",
      css: "CSS",
      bash: "Bash",
      sh: "Shell",
      json: "JSON",
      yaml: "YAML",
      yml: "YAML",
      vue: "Vue",
      svelte: "Svelte",
    };

    const applyCodeLanguageLabels = () => {
      for (const block of document.querySelectorAll(".codehilite")) {
        const languageClass = Array.from(block.classList).find((name) => name.startsWith("language-"));
        if (!languageClass) continue;

        const rawLanguage = languageClass.slice("language-".length);
        const label = labels[rawLanguage] ?? rawLanguage.toUpperCase();
        block.setAttribute("data-language", label);
      }
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", applyCodeLanguageLabels, { once: true });
    } else {
      applyCodeLanguageLabels();
    }
  })();
  </script>
{% endblock %}

{% block announce %}
  <div class="md-banner">
    Adapter v{{ config.extra.adapter_version }}
  </div>
{% endblock %}
