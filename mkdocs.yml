site_name: Adapter Guide
site_description: Documentation for Adapter usage and contribution.
repo_url: https://github.com/keenlycode/adapter
docs_dir: docs-src
site_dir: docs
use_directory_urls: true

nav:
  - Adapter: index.md
  - Usage:
      - Getting Started: usage/getting-started.md
      - Core Concepts: usage/core-concepts.md
      - Patterns & Recipes: usage/patterns-and-recipes.md
      - Caveats & Constraints: usage/caveats-and-constraints.md
      - AI Skill: usage/ai-skill.md
      - Framework Integration: usage/framework-integration.md
  - Contribution:
      - Overview: contribution/overview.md
      - Workflow: contribution/workflow.md
      - Development: contribution/development.md
      - Docstring Guide: contribution/docstring.md

theme:
  name: shadcn
  custom_dir: docs-src/overrides
  pygments_style: one-dark

repo_name: keenlycode/adapter

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  adapter_version: "3.1.1"

markdown_extensions:
  - admonition
  - fenced_code
  - codehilite
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.highlight:
      css_class: codehilite
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
